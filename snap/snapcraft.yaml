name: blade-and-block
version: '1.0.0'
summary: Rowing training planner (erg, on-water, weights, flexibility, run, cycle)
description: |
  A single-user rowing training planner. Plans erg, on-water, weights,
  flexibility, running and cycling sessions across adjustable training
  blocks, with a monthly calendar view and 500m/1k/2k test tracking.
  Runs a small local web server and opens it in your browser. All data
  is stored locally in the browser (IndexedDB) — nothing leaves the machine.

grade: stable
confinement: strict
base: core22

apps:
  blade-and-block:
    command: bin/launcher.sh
    plugs:
      - network
      - network-bind
      - desktop
      - browser-support
      - x11
      - wayland

parts:
  app:
    plugin: dump
    source: .
    organize:
      'index.html': app/index.html
      'manifest.json': app/manifest.json
      'service-worker.js': app/service-worker.js
      'offline.html': app/offline.html
      'css': app/css
      'js': app/js
      'icons': app/icons
      'server': app/server
    stage:
      - app
  runtime:
    plugin: nil
    stage-packages:
      - nodejs
    override-build: |
      craftctl default
    prime:
      - usr/bin/node*
      - usr/lib/node_modules
  launcher:
    plugin: dump
    source: snap/local
    organize:
      'launcher.sh': bin/launcher.sh
